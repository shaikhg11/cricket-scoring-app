<h2 mat-dialog-title>Select Next Bowler</h2>
<mat-dialog-content>
  <div class="bowler-list">
    <button mat-raised-button color="accent"
            *ngFor="let b of data.availableBowlers"
            (click)="selectBowler(b)">
      {{ b }}
    </button>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
</mat-dialog-actions>
