<h2 mat-dialog-title>Select Next Batter</h2>
<mat-dialog-content>
  <div class="batter-list">
    <button mat-raised-button color="primary"
            *ngFor="let b of data.availableBatters"
            (click)="selectBatter(b)">
      {{ b }}
    </button>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
</mat-dialog-actions>
